name: Build & push to Docker Hub

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "deploy/**"
      - "mockup/**"
  workflow_dispatch:

concurrency:
  group: build-push-prod
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image ref
        id: image
        run: |
          echo "image=${{ secrets.DOCKERHUB_USERNAME }}/shamanktmweb:prod-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/shamanktmweb:prod
            ${{ secrets.DOCKERHUB_USERNAME }}/shamanktmweb:prod-${{ github.sha }}
          cache-from: type=gha,scope=shamanktmweb
          cache-to: type=gha,mode=max,scope=shamanktmweb
          build-args: |
            NEXT_PUBLIC_SITE_MODE=${{ vars.NEXT_PUBLIC_SITE_MODE || 'live' }}
            NEXT_PUBLIC_PROJECTX_API_BASE=
            NEXT_PUBLIC_PROJECTX_ORIGIN=${{ vars.NEXT_PUBLIC_PROJECTX_ORIGIN || 'https://shamankathmandu.com' }}
            S3_PUBLIC_BASE=${{ vars.S3_PUBLIC_BASE || 'https://ims-shaman-photos.s3.ap-south-1.amazonaws.com' }}

# Deploy is intentionally NOT wired to CI: the host /opt/shaman_web/.env
# (with POSTGRES_PASSWORD, SESSION_PASSWORD, etc.) is the source of truth and
# we don't want SSH keys or app secrets in GitHub. To roll out a new image:
#   ssh shaman_web "cd /opt/shaman_web && docker compose pull && docker compose up -d"
