name: Build & push prod Docker image

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "deploy/**"
      - ".github/workflows/deploy.yml"
      - "mockup/**"
  workflow_dispatch:

concurrency:
  group: build-push-prod
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/shamanktmweb:prod
            ${{ secrets.DOCKERHUB_USERNAME }}/shamanktmweb:prod-${{ github.sha }}
          cache-from: type=gha,scope=shamanktmweb
          cache-to: type=gha,mode=max,scope=shamanktmweb
          build-args: |
            PROJECTX_API_MODE=${{ vars.PROJECTX_API_MODE || 'mock' }}
            NEXT_PUBLIC_SITE_MODE=${{ vars.NEXT_PUBLIC_SITE_MODE || 'live' }}
            NEXT_PUBLIC_PROJECTX_API_BASE=${{ vars.NEXT_PUBLIC_PROJECTX_API_BASE || 'https://api.projectx.example/api/v1' }}
            NEXT_PUBLIC_PROJECTX_API_KEY=${{ secrets.NEXT_PUBLIC_PROJECTX_API_KEY }}
            NEXT_PUBLIC_PROJECTX_ORIGIN=${{ vars.NEXT_PUBLIC_PROJECTX_ORIGIN || 'https://shamankathmandu.com' }}
