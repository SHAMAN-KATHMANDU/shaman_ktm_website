name: Build, push & deploy to shaman_web

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "deploy/**"
      - "mockup/**"
  workflow_dispatch:

concurrency:
  group: build-push-prod
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image ref
        id: image
        run: |
          echo "image=${{ secrets.DOCKERHUB_USERNAME }}/shamanktmweb:prod-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/shamanktmweb:prod
            ${{ secrets.DOCKERHUB_USERNAME }}/shamanktmweb:prod-${{ github.sha }}
          cache-from: type=gha,scope=shamanktmweb
          cache-to: type=gha,mode=max,scope=shamanktmweb
          build-args: |
            NEXT_PUBLIC_SITE_MODE=${{ vars.NEXT_PUBLIC_SITE_MODE || 'live' }}
            NEXT_PUBLIC_PROJECTX_API_BASE=
            NEXT_PUBLIC_PROJECTX_ORIGIN=${{ vars.NEXT_PUBLIC_PROJECTX_ORIGIN || 'https://shamankathmandu.com' }}
            S3_PUBLIC_BASE=${{ vars.S3_PUBLIC_BASE || 'https://ims-shaman-photos.s3.ap-south-1.amazonaws.com' }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout (for compose file)
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to host
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "docker-compose.yml"
          target: "/opt/shaman_web/"

      - name: Pull image & restart stack on shaman_web
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            export DOCKER_IMAGE='${{ needs.build-and-push.outputs.image }}'
            mkdir -p /opt/shaman_web
            cd /opt/shaman_web
            # First-deploy bootstrap: write .env from GH secrets if missing.
            if [ ! -f .env ]; then
              cat > .env <<EOF
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            DOCKER_IMAGE=${{ needs.build-and-push.outputs.image }}
            APP_PORT=${{ vars.APP_PORT || '3000' }}
            POSTGRES_USER=${{ vars.POSTGRES_USER || 'shaman' }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ vars.POSTGRES_DB || 'shaman' }}
            SESSION_PASSWORD=${{ secrets.SESSION_PASSWORD }}
            ADMIN_BOOTSTRAP_EMAIL=${{ secrets.ADMIN_BOOTSTRAP_EMAIL }}
            ADMIN_BOOTSTRAP_PASSWORD=${{ secrets.ADMIN_BOOTSTRAP_PASSWORD }}
            S3_REGION=${{ vars.S3_REGION || 'ap-south-1' }}
            S3_BUCKET=${{ vars.S3_BUCKET || 'ims-shaman-photos' }}
            S3_PUBLIC_BASE=${{ vars.S3_PUBLIC_BASE || 'https://ims-shaman-photos.s3.ap-south-1.amazonaws.com' }}
            NEXT_PUBLIC_SITE_MODE=${{ vars.NEXT_PUBLIC_SITE_MODE || 'live' }}
            RUN_DB_SEED=1
            EOF
              chmod 600 .env
            else
              # On subsequent deploys: only refresh the image pin. The seed
              # script is idempotent, so RUN_DB_SEED=1 stays on — re-running it
              # each restart is a no-op for existing rows.
              if grep -q '^DOCKER_IMAGE=' .env; then
                sed -i "s|^DOCKER_IMAGE=.*|DOCKER_IMAGE=${DOCKER_IMAGE}|" .env
              else
                echo "DOCKER_IMAGE=${DOCKER_IMAGE}" >> .env
              fi
            fi
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -f
            docker compose ps
