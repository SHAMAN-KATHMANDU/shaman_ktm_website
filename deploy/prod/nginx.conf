# =============================================================================
# deploy/prod/nginx.conf
# Host nginx site config for shamankathmandu.com + www.
# Installed to /etc/nginx/sites-available/shamanktmweb.conf by setup-nginx.sh.
# certbot --nginx will inject the TLS server blocks and the HTTP->HTTPS
# redirect on first run.
#
# Canonical host: www.shamankathmandu.com (apex 301s to www).
# =============================================================================

upstream shamanktmweb_upstream {
    server 127.0.0.1:3000;
    keepalive 32;
}

# www (canonical) — proxies to the container
server {
    listen      80;
    listen      [::]:80;
    server_name www.shamankathmandu.com;

    # Allow Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass         http://shamanktmweb_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        client_max_body_size 1m;
    }
}

# apex -> www (301)
server {
    listen      80;
    listen      [::]:80;
    server_name shamankathmandu.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://www.shamankathmandu.com$request_uri;
    }
}
