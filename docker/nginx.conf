# =============================================================================
# Container nginx config — serves the Next.js static export from /usr/share/nginx/html.
# This runs inside the shamanktmweb container; the host nginx terminates TLS
# and proxies to 127.0.0.1:3000 (which maps to this container's :80).
# =============================================================================

server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/xml application/json
                      application/javascript application/xml+rss
                      application/atom+xml image/svg+xml;

    # Hide nginx version
    server_tokens off;

    # Security headers (host nginx adds HSTS at the TLS layer)
    add_header X-Content-Type-Options "nosniff"           always;
    add_header X-Frame-Options        "SAMEORIGIN"        always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Long-cache hashed Next.js build assets (filenames include content hashes)
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Other static assets from /public — moderate cache
    location ~* \.(?:ico|css|js|gif|jpe?g|png|webp|avif|svg|woff2?|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
        try_files $uri =404;
    }

    # HTML pages: short cache, must-revalidate so deploys land quickly
    location / {
        add_header Cache-Control "public, max-age=60, must-revalidate";
        # Next static export emits real <route>.html files; try the path,
        # then <path>.html, then fall back to 404.html.
        try_files $uri $uri.html $uri/index.html =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
